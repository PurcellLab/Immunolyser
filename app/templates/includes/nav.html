    <header>
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="collapse navbar-collapse" id="navbarText">
              <ul class="navbar-nav mr-auto">
                <li class="nav-item {% if index %}active{% endif %}">
                  <a class="nav-link" href="{{ url_for('index') }}">Home<span class="sr-only">(current)</span></a>
                </li>
                <li class="nav-item {% if initialiser %}active{% endif %}">
                  <a class="nav-link" href="{{ url_for('initialiser') }}">Initialiser</a>
                </li>

                  <a class="nav-link" href="{{ url_for('help') }}">Help</a>
                </li> -->

              <span class="navbar-text">

              </span>

                <small class="text-muted">v{{ app_version }}</small>

              <span id="taskId" hidden>{{taskId}}</span>
