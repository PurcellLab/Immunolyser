{% extends "layout.html" %}

{% block content %}

<div class="container mt-4">
    <div class="alert alert-info">
        {{ message }}<br>
        <small class="text-muted">Please refresh the page periodically or input your email below to receive a notification when the job is finished.</small>
    </div>

    <div class="d-flex align-items-center">
        <button id="checkStatusBtn" class="btn btn-primary mr-auto" onclick="checkStatus()">Click here to refresh status.</button>
        <div id="statusMessage" class="ml-auto"></div>
    </div>
</div>

<div id="emailSection" class="container mt-4">
    <input type="text" id="jobNameInput" class="form-control w-100 mb-2"
           placeholder="Enter a name for your job">
    <input type="email" id="emailInput" class="form-control w-100 mb-2"
           placeholder="Enter your email for notification">
    <button class="btn btn-secondary" onclick="submitEmail()">Submit Email</button>
</div>

<script>
function checkStatus() {
    const jobId = '{{ message.split("Task ID is ")[1] }}';
    fetch(`/check_status/${jobId}`)
        .then(response => response.json())
        .then(data => {
            const btn = document.getElementById('checkStatusBtn');
            const statusMessage = document.getElementById('statusMessage');
            const emailSection = document.getElementById('emailSection');

            btn.classList.remove('btn-primary', 'btn-success', 'btn-danger', 'btn-warning');

            if (data.status === 'success') {
                btn.classList.add('btn-success');
                btn.innerText = 'Success';
                statusMessage.innerHTML = `
                    <button class="btn btn-primary mr-2" onclick="openReport('${jobId}')">Open Report</button>
                    <button class="btn btn-primary" onclick="copyToClipboard('${window.location.origin}/${jobId}')">Copy Link</button>
                `;
                emailSection.style.display = 'none';
            } else if (data.status === 'failure') {
                btn.classList.add('btn-danger');
                btn.innerText = 'Failure';
                
                statusMessage.innerHTML = ''; // clear previous content
                const failBtn = document.createElement('button');
                failBtn.className = 'btn btn-danger';
                failBtn.innerText = 'Click to see trace';
                failBtn.addEventListener('click', () => showTraceback(data.traceback));
                statusMessage.appendChild(failBtn);
                
                emailSection.style.display = 'none';
            } else if (data.status === 'pending') {
                btn.classList.add('btn-warning');
                btn.innerText = 'Processing.. Click here again to refresh status.';
                statusMessage.innerText = 'Status: Processing';
                emailSection.style.display = 'block';
            } else {
                statusMessage.innerText = `Status: ${data.status}`;
                emailSection.style.display = 'none';
            }
        });
}

function submitEmail() {
    const email = document.getElementById('emailInput').value;
    const jobName = document.getElementById('jobNameInput').value;
    const jobId = '{{ message.split("Task ID is ")[1] }}';

    if (!/\S+@\S+\.\S+/.test(email)) {
        alert('Invalid email address!');
        return;
    }

    fetch(`/submit_email/${jobId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, job_name: jobName })
    }).then(res => {
        if (res.ok) {
            document.getElementById('emailSection').innerHTML =
                '<div class="text-success">Details submitted successfully!</div>';
        } else {
            alert('Error submitting job details.');
        }
    });
}

    function openReport(jobId) {
        window.open(`/${jobId}`, '_blank');
    }

    function copyToClipboard(text) {
        const el = document.createElement('textarea');
        el.value = text;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        alert('Link copied to clipboard!');
    }

</script>

{% endblock %}
